<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.headline }} | Breaking Bakwaas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3.0">
</head>
<body style="background:#f1faee; font-family:'Poppins',sans-serif;">
    <div class="top-nav">
        <a href="/" style="color:var(--secondary);text-decoration:none;font-size:24px;margin-right:15px;">←</a>
        <h1 class="header-title">📰 Breaking Bakwaas</h1>
    </div>

    <div style="max-width:800px;margin:40px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
        <div class="pdf-print-area" style="box-shadow:none;border:none;">
            <div class="pdf-header">📰 BREAKING BAKWAAS</div>
            <div style="font-size:12px;color:#888;">{{ item.date }}</div>
            <h1 style="font-size:2.2rem;margin:15px 0;">{{ item.headline }}</h1>
            
            {% if item.image_prompt %}
            <div class="pdf-photo-evidence" style="background:#f1faee;padding:15px;border-radius:8px;margin:20px 0;">
                📸 <strong>Photographic Evidence</strong><br>
                <em>{{ item.image_prompt }}</em>
            </div>
            {% endif %}
            
            <p style="line-height:1.8;font-size:1.1rem;">{{ item.content }}</p>
            
            <div style="margin-top:40px;padding-top:20px;border-top:2px dashed #e63946;text-align:center;color:#666;">
                <p>🔥 Share this bakwaas!</p>
                <button onclick="shareToWhatsApp('{{ item.id }}', '{{ item.headline|urlencode }}')" style="margin:5px;padding:12px 20px;background:#25D366;color:white;border:none;border-radius:50px;cursor:pointer;">📱 WhatsApp</button>
                <button onclick="shareToX('{{ item.id }}', '{{ item.headline|urlencode }}')" style="margin:5px;padding:12px 20px;background:#000;color:white;border:none;border-radius:50px;cursor:pointer;">𝕏 Post on X</button>
                <button onclick="copyLink('{{ item.id }}')" style="margin:5px;padding:12px 20px;background:#1d3557;color:white;border:none;border-radius:50px;cursor:pointer;">🔗 Copy Link</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
